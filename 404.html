<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>
<meta name="robots" content="noindex,nofollow">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#050505,#111,#1b1b1b);
    font-family:Arial, sans-serif;
    overflow:hidden;
    position:relative;
}

/* background glow */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255, 208, 82, 0.08);
    filter:blur(120px);
    top:-100px;
    left:-100px;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    background:rgba(255,255,255,0.04);
    filter:blur(100px);
    bottom:-100px;
    right:-100px;
}

.container{
    text-align:center;
    padding:40px;
    position:relative;
    z-index:10;
    max-width:800px;
}

/* 404 text */
.error-code{
    font-size:160px;
    font-weight:900;
    line-height:1;
    color:#f6d58b;
    text-shadow:
      0 0 20px rgba(246,213,139,.4),
      0 0 50px rgba(246,213,139,.15);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0px)}
    50%{transform:translateY(-10px)}
}

h1{
    margin-top:10px;
    font-size:42px;
    color:white;
    letter-spacing:1px;
}

p{
    margin-top:18px;
    color:#bdbdbd;
    font-size:18px;
    line-height:1.8;
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
}

/* button */
.btn{
    margin-top:35px;
    display:inline-block;
    text-decoration:none;
    padding:15px 35px;
    border:2px solid #f6d58b;
    color:#f6d58b;
    font-weight:bold;
    letter-spacing:1px;
    transition:.3s;
    border-radius:12px;
}

.btn:hover{
    background:#f6d58b;
    color:#111;
    transform:translateY(-4px);
    box-shadow:0 0 25px rgba(246,213,139,.3);
}

/* decorative grid */
.grid{
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:1;
}

footer{
    margin-top:40px;
    color:#666;
    font-size:13px;
    letter-spacing:2px;
}

/* mobile */
@media(max-width:768px){

.error-code{
    font-size:110px;
}

h1{
    font-size:28px;
}

p{
    font-size:15px;
}

}
</style>
</head>

<body>

<div class="grid"></div>

<div class="container">

    <div class="error-code">404</div>

    <h1>Page Not Found</h1>

    <p>
        The page you are looking for may have been moved,
        deleted, or is temporarily unavailable.
        Please return to the homepage and continue exploring.
    </p>

    <a href="/" class="btn">
        RETURN HOME
    </a>

    <footer>
        GABALEMON.NET
    </footer>

</div>

</body>
</html>
